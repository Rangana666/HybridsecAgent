name: 🚀 Deploy HybridSec to VPS

# ── Triggers ─────────────────────────────────────────────────────
# Runs automatically on every push to the main branch
on:
  push:
    branches:
      - main
  # Also allows manual trigger from GitHub Actions UI
  workflow_dispatch:

# ── Jobs ─────────────────────────────────────────────────────────
jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout code ───────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: SSH into AWS EC2 and deploy ─────────────────────
      # VPS_USER  = ubuntu   (AWS EC2 Ubuntu default user — NOT root)
      # VPS_SSH_KEY = full contents of your HybridSec_Agent.pem file
      # VPS_HOST  = your EC2 public IP or hostname
      # VPS_PORT  = 22
      - name: 🚀 Deploy to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 10m
          script: |
            set -euo pipefail

            INSTALL_DIR="/opt/hybridsec"
            SERVICE_NAME="hybridsec"

            echo "========================================"
            echo "  HybridSec Agent — Auto Deploy"
            echo "  Triggered by: GitHub Actions"
            echo "  Time: $(date)"
            echo "========================================"

            # ── Pull latest code ─────────────────────
            # /opt/hybridsec is owned by root, so use sudo
            echo "[1/5] Pulling latest code from GitHub..."
            sudo git -C "$INSTALL_DIR" fetch --all
            sudo git -C "$INSTALL_DIR" reset --hard origin/main
            echo "✅ Code updated to: $(sudo git -C $INSTALL_DIR log --oneline -1)"

            # ── Install / update Python packages ─────
            echo "[2/5] Updating Python packages..."
            sudo "$INSTALL_DIR/venv/bin/pip" install \
              --quiet \
              --prefer-binary \
              --upgrade \
              -r "$INSTALL_DIR/requirements.txt"
            echo "✅ Python packages updated."

            # ── Retrain ML model if needed ────────────
            echo "[3/5] Checking if ML model needs retraining..."
            CHANGED=$(sudo git -C "$INSTALL_DIR" diff HEAD@{1} HEAD --name-only 2>/dev/null || echo "")
            if echo "$CHANGED" | grep -q "train_model.py\|requirements.txt"; then
              echo "  → ML training script changed — retraining model..."
              sudo "$INSTALL_DIR/venv/bin/python3" \
                -m modules.module3_scoring.models.train_model
              echo "✅ ML model retrained."
            else
              echo "  → No ML changes — skipping retrain."
            fi

            # ── Restart service ───────────────────────
            echo "[4/5] Restarting HybridSec service..."
            sudo systemctl daemon-reload
            sudo systemctl restart "$SERVICE_NAME"
            sleep 4

            # ── Health check ──────────────────────────
            echo "[5/5] Running health check..."
            if sudo systemctl is-active --quiet "$SERVICE_NAME"; then
              echo "✅ HybridSec is running!"
              echo "========================================"
              echo "  ✅ DEPLOYMENT SUCCESSFUL"
              echo "========================================"
            else
              echo "❌ Service failed to start! Last 30 log lines:"
              sudo journalctl -u "$SERVICE_NAME" -n 30 --no-pager
              exit 1
            fi

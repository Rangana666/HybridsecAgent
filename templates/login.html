{% extends "base.html" %}
{% block title %}Login — HybridSec Agent{% endblock %}

{% block content %}
<div class="login-wrapper d-flex align-items-center justify-content-center vh-100">
  <div class="login-card card shadow-lg" style="width:420px;">
    <div class="card-body p-5">

      <!-- Logo -->
      <div class="text-center mb-4">
        <i class="bi bi-shield-shaded text-cyan" style="font-size:3rem;"></i>
        <h4 class="fw-bold mt-2 mb-0">HybridSec Agent</h4>
        <p class="text-muted small">Linux Security Risk Analysis Platform</p>
      </div>

      {% if error %}
        <div class="alert alert-danger py-2 small">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
      {% endif %}

      <form method="POST" action="{{ url_for('auth.login') }}" autocomplete="off">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="mb-3">
          <label class="form-label small fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary">
              <i class="bi bi-person text-muted"></i>
            </span>
            <input type="text" name="username" class="form-control bg-dark border-secondary text-white"
                   placeholder="admin" required autofocus>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-dark border-secondary">
              <i class="bi bi-lock text-muted"></i>
            </span>
            <input type="password" name="password" class="form-control bg-dark border-secondary text-white"
                   placeholder="••••••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-cyan w-100 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <p class="text-center text-muted mt-4 mb-0" style="font-size:0.75rem;">
        HybridSec v1.0 &mdash; For authorised administrators only
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Two-Factor Authentication — HybridSec{% endblock %}

{% block content %}
<div class="login-wrapper d-flex align-items-center justify-content-center vh-100">
  <div class="login-card card shadow-lg" style="width:400px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-phone text-cyan" style="font-size:2.5rem;"></i>
        <h5 class="fw-bold mt-2">Two-Factor Authentication</h5>
        <p class="text-muted small">Enter the 6-digit code from your authenticator app.</p>
      </div>

      {% if error %}
        <div class="alert alert-danger py-2 small">
          <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
      {% endif %}

      <form method="POST" action="{{ url_for('auth.verify_2fa') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-4">
          <input type="text" name="otp_code"
                 class="form-control form-control-lg text-center bg-dark border-secondary text-white"
                 placeholder="000000" maxlength="6" required autofocus
                 style="letter-spacing:0.5rem; font-size:1.6rem;">
        </div>
        <button type="submit" class="btn btn-cyan w-100 fw-semibold">
          <i class="bi bi-check2-circle me-2"></i>Verify
        </button>
      </form>
      <div class="text-center mt-3">
        <a href="{{ url_for('auth.login') }}" class="text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Back to login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
